openapi: 3.0.3
info:
  description: |
    REST API for managing, executing, and monitoring workflows, human tasks, incidents, and outgoing webhooks inside the NativeBPM Cloud-Native engine.

    ### Authentication
    Requests must include a session cookie or a Bearer API token:
    `Authorization: Bearer <API_TOKEN>`
  title: NativeBPM Engine REST API
  version: 1.0.0
servers:
- url: /
paths:
  /api/definitions:
    get:
      description: Retrieve a list of all deployed process definitions.
      operationId: listDefinitions
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProcessDefinition"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List process definitions
  /api/deploy:
    post:
      description: Deploy a new BPMN 2.0 XML process definition.
      operationId: deployDefinition
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/deployDefinition_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessDefinition"
          description: Successful response
        "400":
          description: Invalid request body or malformed BPMN XML
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Deploy process definition
  /api/definitions/{id}/start:
    post:
      description: Start a new workflow process instance by process definition ID.
      operationId: startInstance
      parameters:
      - description: "The process definition ID (e.g., matching the BPMN process element\
          \ ID)"
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartInstanceRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInstance"
          description: Successful response
        "400":
          description: Invalid variables or configuration
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Start process instance
  /api/instances:
    get:
      description: Retrieve a list of active and completed process instances.
      operationId: listInstances
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ProcessInstance"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List process instances
  /api/instances/{id}:
    get:
      description: Fetch a single process instance state by instance ID.
      operationId: getInstance
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInstance"
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "404":
          description: Process instance not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Get process instance
  /api/instances/{id}/history:
    get:
      description: Fetch the audit trail / execution history log for a process instance.
      operationId: getInstanceHistory
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/HistoryRecord"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Get process instance execution history
  /api/instances/{id}/incidents:
    get:
      description: Get active execution incidents (failures) for a specific process
        instance.
      operationId: listIncidents
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/IncidentRecord"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "404":
          description: Process instance not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List incidents for process instance
  /api/instances/{id}/complete:
    post:
      description: Complete a specific active node/wait state within a process instance.
      operationId: completeInstanceTask
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteInstanceTaskRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInstance"
          description: Process instance state after completion
        "400":
          description: Missing parameter node_id or invalid payload
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Complete a wait state / task activity in process instance
  /api/instances/{id}/resume:
    post:
      description: Manually trigger execution resumption of a process instance.
      operationId: resumeInstance
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInstance"
          description: Process instance state after resuming
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Resume process instance
  /api/instances/{id}/incidents/{incidentId}/resolve:
    post:
      description: "Resolve a process execution failure incident, triggering retry/resume."
      operationId: resolveIncident
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: incidentId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/resolveIncident_200_response"
          description: Incident resolved successfully
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Resolve process incident
  /api/tasks:
    get:
      description: "Query tasks matching criteria (assignee, candidateGroup, status)."
      operationId: listTasks
      parameters:
      - explode: true
        in: query
        name: assignee
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: candidateGroup
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - CREATED
          - CLAIMED
          - COMPLETED
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/TaskRecord"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List human/user tasks
  /api/tasks/{id}/claim:
    post:
      description: Claim a task for a specific user assignee.
      operationId: claimTask
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/claimTask_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskRecord"
          description: Task claimed successfully
        "400":
          description: Task cannot be claimed
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Task not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Claim human task
  /api/tasks/{id}/complete:
    post:
      description: "Complete a claimed human task, providing results variables."
      operationId: completeTask
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/completeTask_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessInstance"
          description: Task completed successfully
        "400":
          description: Task is not claimed
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Task not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Complete human task
  /api/webhooks:
    get:
      description: List all registered webhook targets.
      operationId: listWebhooks
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WebhookRecord"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List configured outgoing webhooks
    post:
      description: Register a new webhook target.
      operationId: createWebhook
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRecord"
          description: Webhook created successfully
        "400":
          description: Invalid URL or events list
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Create webhook target
  /api/webhooks/{id}:
    delete:
      description: Delete a webhook configuration.
      operationId: deleteWebhook
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/resolveIncident_200_response"
          description: Webhook deleted successfully
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Webhook not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Delete webhook target
    put:
      description: Modify the configuration of an existing webhook.
      operationId: updateWebhook
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRecord"
          description: Webhook updated successfully
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Webhook not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Update webhook target
  /api/webhooks/{id}/test:
    post:
      description: Send a test ping event delivery to verification URL.
      operationId: testWebhook
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/resolveIncident_200_response"
          description: Test ping sent successfully
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Webhook not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: Test webhook target
  /api/webhooks/{id}/deliveries:
    get:
      description: Get delivery audit logs and history queue for a specific webhook
        target.
      operationId: listWebhookDeliveries
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WebhookDeliveryRecord"
                type: array
          description: Successful response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Unauthorized - missing or invalid session cookie / API Bearer
            Token
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listDefinitions_401_response"
          description: Forbidden - insufficient operator permissions or role level
        "404":
          description: Webhook not found
        "500":
          description: Internal Server Error - database failure or execution crash
      summary: List deliveries for webhook
components:
  responses:
    "401Unauthorized":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/listDefinitions_401_response"
      description: Unauthorized - missing or invalid session cookie / API Bearer Token
    "403Forbidden":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/listDefinitions_401_response"
      description: Forbidden - insufficient operator permissions or role level
    "500InternalError":
      description: Internal Server Error - database failure or execution crash
  schemas:
    ProcessDefinition:
      example:
        hash: hash
        id: id
        name: name
        xml_data: xml_data
        deployed_at: 2000-01-23T04:56:07.000+00:00
      properties:
        hash:
          description: MD5/SHA256 content hash of the process XML schema definition
          type: string
        id:
          description: Unique process definition identifier
          type: string
        name:
          description: Friendly name of the process
          type: string
        xml_data:
          description: Base64-encoded raw BPMN 2.0 XML schema data
          format: byte
          type: string
        deployed_at:
          format: date-time
          type: string
      required:
      - deployed_at
      - hash
      - id
      - name
      - xml_data
      type: object
    ProcessInstance:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        process_id: process_id
        definition_hash: definition_hash
        business_key: business_key
        state: state
        version: 0
        completed: true
        updated_at: 2000-01-23T04:56:07.000+00:00
        tenant_id: tenant_id
      properties:
        id:
          format: uuid
          type: string
        process_id:
          type: string
        definition_hash:
          type: string
        business_key:
          type: string
        state:
          description: Base64/raw JSON encoded internal Wazero process engine state
            representation
          format: byte
          type: string
        version:
          type: integer
        completed:
          type: boolean
        updated_at:
          format: date-time
          type: string
        tenant_id:
          type: string
      required:
      - business_key
      - completed
      - definition_hash
      - id
      - process_id
      - state
      - tenant_id
      - updated_at
      - version
      type: object
    HistoryRecord:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        instance_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        node_id: node_id
        node_name: node_name
        node_type: node_type
        action: start
        variables: variables
        timestamp: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: uuid
          type: string
        instance_id:
          format: uuid
          type: string
        node_id:
          type: string
        node_name:
          type: string
        node_type:
          type: string
        action:
          example: start
          type: string
        variables:
          description: JSON encoded payload variables associated with this transition
          format: byte
          type: string
        timestamp:
          format: date-time
          type: string
      required:
      - action
      - id
      - instance_id
      - node_id
      - node_name
      - node_type
      - timestamp
      type: object
    IncidentRecord:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        instance_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        activity_id: activity_id
        error_message: error_message
        stack_trace: stack_trace
        attempts_made: 0
        resolved: true
        created_at: 2000-01-23T04:56:07.000+00:00
        resolved_at: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: uuid
          type: string
        instance_id:
          format: uuid
          type: string
        activity_id:
          type: string
        error_message:
          type: string
        stack_trace:
          type: string
        attempts_made:
          type: integer
        resolved:
          type: boolean
        created_at:
          format: date-time
          type: string
        resolved_at:
          format: date-time
          type: string
      required:
      - activity_id
      - attempts_made
      - created_at
      - error_message
      - id
      - instance_id
      - resolved
      type: object
    TaskRecord:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        instance_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        activity_id: activity_id
        name: name
        assignee: assignee
        candidate_groups: candidate_groups
        status: CREATED
        due_date: 2000-01-23T04:56:07.000+00:00
        input_schema: input_schema
        created_at: 2000-01-23T04:56:07.000+00:00
        claimed_at: 2000-01-23T04:56:07.000+00:00
        completed_at: 2000-01-23T04:56:07.000+00:00
        current_step: 0
        draft_variables:
          key: ""
      properties:
        id:
          format: uuid
          type: string
        instance_id:
          format: uuid
          type: string
        activity_id:
          type: string
        name:
          type: string
        assignee:
          type: string
        candidate_groups:
          type: string
        status:
          example: CREATED
          type: string
        due_date:
          format: date-time
          type: string
        input_schema:
          description: JSON schema definition of form widgets
          type: string
        created_at:
          format: date-time
          type: string
        claimed_at:
          format: date-time
          type: string
        completed_at:
          format: date-time
          type: string
        current_step:
          type: integer
        draft_variables:
          additionalProperties: true
          type: object
      required:
      - activity_id
      - assignee
      - candidate_groups
      - created_at
      - id
      - instance_id
      - name
      - status
      type: object
    WebhookRecord:
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        tenant_id: tenant_id
        url: url
        secret: secret
        events:
        - events
        - events
        process_id: process_id
        is_active: true
        enable_audit: true
        status: status
        created_at: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          format: uuid
          type: string
        tenant_id:
          type: string
        url:
          type: string
        secret:
          type: string
        events:
          items:
            type: string
          type: array
        process_id:
          type: string
        is_active:
          type: boolean
        enable_audit:
          type: boolean
