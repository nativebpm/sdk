name: Mirror SDK & release on annotated tag

on:
  push:
    tags:
      - "*/v*"

permissions:
  contents: read

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      has_annotation: ${{ steps.check.outputs.has_annotation }}
      module_name: ${{ steps.check.outputs.module_name }}
      tag_name: ${{ steps.check.outputs.tag_name }}
      full_tag: ${{ steps.check.outputs.full_tag }}
      tag_annotation: ${{ steps.check.outputs.tag_annotation }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check tag and extract annotation
        id: check
        run: |
          # Fetch tags with annotations explicitly
          git fetch --tags --force
          
          FULL_TAG="${GITHUB_REF#refs/tags/}"
          echo "Processing tag: $FULL_TAG"
          
          MODULE_NAME="${FULL_TAG%%/*}"
          TAG_NAME="${FULL_TAG#*/}"
          
          if [[ -z "$MODULE_NAME" || -z "$TAG_NAME" ]]; then
            echo "❌ Invalid tag format. Expected: <module>/vX.Y.Z"
            exit 1
          fi
          
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Expected: vX.Y.Z, got: $TAG_NAME"
            exit 1
          fi
          
          if [[ ! -d "$MODULE_NAME" ]]; then
            echo "❌ SDK directory '$MODULE_NAME' not found"
            exit 1
          fi
          
          # Check if tag exists and get its type
          if ! git rev-parse "$FULL_TAG" >/dev/null 2>&1; then
            echo "❌ Tag not found: $FULL_TAG"
            exit 1
          fi
          
          # Check if tag is annotated or lightweight
          TAG_TYPE=$(git cat-file -t "$FULL_TAG" 2>/dev/null || echo "commit")
          if [[ "$TAG_TYPE" == "tag" ]]; then
            ANNOTATION=$(git cat-file tag "$FULL_TAG" | sed '1,/^$/d')
          else
            echo "ℹ️ Tag '$FULL_TAG' is lightweight. Using fallback description."
            ANNOTATION="Release $TAG_NAME of $MODULE_NAME SDK"
          fi
          
          echo "✅ Tag processed successfully"
          echo "Module: $MODULE_NAME"
          echo "Version: $TAG_NAME"
          echo "Annotation: $ANNOTATION"
          
          echo "has_annotation=true" >> $GITHUB_OUTPUT
          echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT
          {
            echo "tag_annotation<<EOF_ANNOTATION"
            echo "$ANNOTATION"
            echo "EOF_ANNOTATION"
          } >> $GITHUB_OUTPUT

  mirror-and-release:
    needs: check-tag
    if: needs.check-tag.outputs.has_annotation == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go (needed for go mod tidy if mirroring Go)
        if: needs.check-tag.outputs.module_name == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Clone mirror repository
        env:
          PAT_PUSH: ${{ secrets.PAT_PUSH }}
          MODULE: ${{ needs.check-tag.outputs.module_name }}
        run: |
          git clone "https://x-access-token:${PAT_PUSH}@github.com/nativebpm/sdk-${MODULE}.git" mirror
          cd mirror
          git config user.name "nativebpm-bot"
          git config user.email "bot@nativebpm.com"

      - name: Sync SDK content to mirror
        env:
          MODULE: ${{ needs.check-tag.outputs.module_name }}
        run: |
          cd mirror
          git checkout main 2>/dev/null || git checkout -b main
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a ../${MODULE}/. ./
          
          # Replace placeholder repository paths
          if grep -Ilr "github.com/GIT_USER_ID/GIT_REPO_ID" . 2>/dev/null; then
            grep -Ilr "github.com/GIT_USER_ID/GIT_REPO_ID" . | while read -r file; do
              sed -i "s|github.com/GIT_USER_ID/GIT_REPO_ID|github.com/nativebpm/sdk-${MODULE}|g" "$file"
            done
          fi

          # Replace Go module imports and run go mod tidy
          if [[ "$MODULE" == "go" ]]; then
            if [[ -f go.mod ]]; then
              sed -i "s|gitlab.com/nativebpm/sdk/go|github.com/nativebpm/sdk-go|g" go.mod
            fi
            if grep -Ilr "gitlab.com/nativebpm/sdk/go" . 2>/dev/null; then
              grep -Ilr "gitlab.com/nativebpm/sdk/go" . | while read -r file; do
                sed -i "s|gitlab.com/nativebpm/sdk/go|github.com/nativebpm/sdk-go|g" "$file"
              done
            fi
            if [[ -f go.mod ]]; then
              rm -f go.sum
              go env -w GOPRIVATE="github.com/nativebpm/*"
              go mod tidy || true
            fi
          fi
          
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update from SDK monorepo"
            git push origin main
          fi

      - name: Create annotated tag in mirror
        env:
          TAG_NAME: ${{ needs.check-tag.outputs.tag_name }}
          TAG_ANNOTATION: ${{ needs.check-tag.outputs.tag_annotation }}
        run: |
          cd mirror
          
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping."
            exit 0
          fi
          
          echo "$TAG_ANNOTATION" > /tmp/tag_message.txt
          git tag -a "$TAG_NAME" -F /tmp/tag_message.txt
          git push origin "$TAG_NAME"
          echo "✅ Created tag: $TAG_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.PAT_PUSH }}
          TAG_NAME: ${{ needs.check-tag.outputs.tag_name }}
          TAG_ANNOTATION: ${{ needs.check-tag.outputs.tag_annotation }}
        run: |
          cd mirror
          
          IS_DRAFT=$(gh release view "$TAG_NAME" --json isDraft -q .isDraft 2>/dev/null || echo "not_found")
          
          TITLE=$(echo "$TAG_ANNOTATION" | head -n 1)
          if [[ -z "$TITLE" ]]; then
            TITLE="$TAG_NAME"
          fi
          echo "$TAG_ANNOTATION" > /tmp/release_body.md
          
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "Release $TAG_NAME in mirror is currently a draft. Publishing it..."
            gh release edit "$TAG_NAME" \
              --draft=false \
              --title "$TITLE" \
              --notes-file /tmp/release_body.md
            echo "✅ Published existing draft release in mirror: $TAG_NAME"
          elif [[ "$IS_DRAFT" == "false" ]]; then
            echo "Release $TAG_NAME in mirror is already published. Skipping."
          else
            echo "Release $TAG_NAME does not exist in mirror. Creating it..."
            gh release create "$TAG_NAME" \
              --title "$TITLE" \
              --notes-file /tmp/release_body.md
            echo "✅ Created and published release in mirror: $TAG_NAME"
          fi

      - name: Create or publish GitHub release in monorepo
        env:
          GH_TOKEN: ${{ secrets.PAT_PUSH }}
          FULL_TAG: ${{ needs.check-tag.outputs.full_tag }}
          TAG_ANNOTATION: ${{ needs.check-tag.outputs.tag_annotation }}
        run: |
          IS_DRAFT=$(gh release view "$FULL_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft -q .isDraft 2>/dev/null || echo "not_found")
          
          TITLE=$(echo "$TAG_ANNOTATION" | head -n 1)
          if [[ -z "$TITLE" ]]; then
            TITLE="$FULL_TAG"
          fi
          echo "$TAG_ANNOTATION" > /tmp/monorepo_release_body.md
          
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "Release $FULL_TAG is currently a draft. Publishing it..."
            gh release edit "$FULL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft=false \
              --title "$TITLE" \
              --notes-file /tmp/monorepo_release_body.md
            echo "✅ Published existing draft release in monorepo: $FULL_TAG"
          elif [[ "$IS_DRAFT" == "false" ]]; then
            echo "Release $FULL_TAG is already published in monorepo. Skipping."
          else
            echo "Release $FULL_TAG does not exist in monorepo. Creating it..."
            gh release create "$FULL_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --notes-file /tmp/monorepo_release_body.md
            echo "✅ Created and published release in monorepo: $FULL_TAG"
          fi
